    is_primary_key: yes
  - name: covariate_id
    type: bigint
    description: A foreign key referencing the cm_covariate table.
    is_primary_key: yes
  - name: evidence_synthesis_analysis_id
    type: int
    description: A foreign key referencing the es_analysis table.
    is_primary_key: yes
  - name: std_diff_before
    type: float
    description: The standardized difference of the means between the target and comparator
      cohort before propensity score adjustment.
    is_primary_key: no
  - name: std_diff_var_before
    type: float
    description: The variance of the standardized difference of the means between
      the target and comparator cohort before propensity score adjustment.
    is_primary_key: no
  - name: balanced_before
    type: int
    description: Is the covariate balanced before propensity score adjustment? (1
      = yes, 0 = no)
    is_primary_key: no
  - name: std_diff_after
    type: float
    description: The standardized difference of the means between the target and comparator
      cohort after propensity score adjustment.
    is_primary_key: no
  - name: std_diff_var_after
    type: float
    description: The variance of the standardized difference of the means between
      the target and comparator cohort after propensity score adjustment.
    is_primary_key: no
  - name: balanced_after
    type: int
    description: Is the covariate balanced after propensity score adjustment? (1 =
      yes, 0 = no)
    is_primary_key: no
- name: es_cm_covariate
  description: Results data table es_cm_covariate.
  fields:
  - name: covariate_id
    type: bigint
    description: A unique identified for a covariate.
    is_primary_key: yes
  - name: covariate_name
    type: varchar
    description: 'A name for a covariate, e.g. ''Age group: 20-25 years''.'
    is_primary_key: no
  - name: analysis_id
    type: int
    description: Foreign key referencing the cm_analysis table.
    is_primary_key: yes
  - name: covariate_analysis_id
    type: int
    description: Foreign key referencing the cm_covariate_analysis table.
    is_primary_key: no
- name: es_sccs_diagnostics_summary
  description: Results data table es_sccs_diagnostics_summary.
  fields:
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: covariate_id
    type: int
    description: A foreign key referencing the sccs_covariate table. The identifier
      for the covariate of interest.
    is_primary_key: yes
  - name: analysis_id
    type: int
    description: A unique identifier for the cohort method analysis.
    is_primary_key: yes
  - name: evidence_synthesis_analysis_id
    type: int
    description: A foreign key referencing the es_analysis table.
    is_primary_key: yes
  - name: mdrr
    type: float
    description: The minimum detectable relative risk.
    is_primary_key: no
  - name: i_2
    type: float
    description: The I2 statistics for heterogeneity.
    is_primary_key: no
  - name: tau
    type: float
    description: The estimated tau (standard deviation of the random-effects distribution).
    is_primary_key: no
  - name: ease
    type: float
    description: The expected absolute systematic error.
    is_primary_key: no
  - name: mdrr_diagnostic
    type: varchar(13)
    description: PASS/ NOT EVALUATED / FAIL classification of the MDRR diagnostic.
    is_primary_key: no
  - name: i_2_diagnostic
    type: varchar(13)
    description: Pass / warning / fail classification of the I2 diagnostic.
    is_primary_key: no
  - name: tau_diagnostic
    type: varchar(13)
    description: Pass / warning / fail classification of the tau diagnostic.
    is_primary_key: no
  - name: ease_diagnostic
    type: varchar(13)
    description: Pass / warning / fail classification of the EASE diagnostic.
    is_primary_key: no
  - name: unblind
    type: int
    description: Is unblinding the result recommended? (1 = yes, 0 = no)
    is_primary_key: no
- name: es_sccs_result
  description: Results data table es_sccs_result.
  fields:
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: covariate_id
    type: int
    description: A foreign key referencing the sccs_covariate table. The identifier
      for the covariate of interest.
    is_primary_key: yes
  - name: evidence_synthesis_analysis_id
    type: int
    description: A foreign key referencing the es_analysis table.
    is_primary_key: yes
  - name: rr
    type: float
    description: The estimated relative risk (i.e. the incidence rate ratio).
    is_primary_key: no
  - name: ci_95_lb
