    is_primary_key: no
  - name: p
    type: float
    description: The two-sided p-value considering the null hypothesis of no effect.
    is_primary_key: no
  - name: one_sided_p
    type: float
    description: The one-sided p-value considering the null hypothesis of RR <= 1.
    is_primary_key: no
  - name: outcome_subjects
    type: int
    description: The number of subjects with at least one outcome.
    is_primary_key: no
  - name: outcome_events
    type: int
    description: The number of outcome events.
    is_primary_key: no
  - name: outcome_observation_periods
    type: int
    description: The number of observation periods containing at least one outcome.
    is_primary_key: no
  - name: covariate_subjects
    type: int
    description: The number of subjects having the covariate.
    is_primary_key: no
  - name: covariate_days
    type: bigint
    description: The total covariate time in days.
    is_primary_key: no
  - name: covariate_eras
    type: int
    description: The number of continuous eras of the covariate.
    is_primary_key: no
  - name: covariate_outcomes
    type: int
    description: The number of outcomes observed during the covariate time.
    is_primary_key: no
  - name: observed_days
    type: bigint
    description: The number of days subjects were observed.
    is_primary_key: no
  - name: n_databases
    type: int
    description: The number of databases that contributed to the meta-analytic estimate.
    is_primary_key: no
  - name: log_rr
    type: float
    description: The log of the relative risk.
    is_primary_key: no
  - name: se_log_rr
    type: float
    description: The standard error of the log of the relative risk.
    is_primary_key: no
  - name: calibrated_rr
    type: float
    description: The calibrated relative risk.
    is_primary_key: no
  - name: calibrated_ci_95_lb
    type: float
    description: The lower bound of the calibrated 95% confidence interval of the
      relative risk.
    is_primary_key: no
  - name: calibrated_ci_95_ub
    type: float
    description: The upper bound of the calibrated 95% confidence interval of the
      relative risk.
    is_primary_key: no
  - name: calibrated_p
    type: float
    description: The calibrated two-sided p-value.
    is_primary_key: no
  - name: calibrated_one_sided_p
    type: float
    description: The calibrated one-sided p-value considering the null hypothesis
      of RR <= 1.
    is_primary_key: no
  - name: calibrated_log_rr
    type: float
    description: The log of the calibrated relative risk.
    is_primary_key: no
  - name: calibrated_se_log_rr
    type: float
    description: The standard error of the log of the calibrated relative risk.
    is_primary_key: no
  - name: pi_95_lb
    type: float
    description: The lower bound of the 95% prediction interval of the relative risk.
    is_primary_key: no
  - name: pi_95_ub
    type: float
    description: The upper  bound of the 95% prediction interval of the relative risk.
    is_primary_key: no
  - name: calibrated_pi_95_lb
