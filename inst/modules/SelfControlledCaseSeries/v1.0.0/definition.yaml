module: SelfControlledCaseSeries
prefix: sccs_
tables:
- name: sccs_analysis
  description: Results data table sccs_analysis.
  fields:
  - name: analysis_id
    type: int
    description: A unique identifier for an analysis.
    is_primary_key: yes
  - name: description
    type: varchar
    description: A description for an analysis, e.g. 'Correcting for age and season'.
    is_primary_key: no
  - name: definition
    type: varchar
    description: A JSON object specifying the analysis.
    is_primary_key: no
- name: sccs_covariate_analysis
  description: Results data table sccs_covariate_analysis.
  fields:
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: covariate_analysis_id
    type: int
    description: A unique identifier for a covariate analysis.
    is_primary_key: yes
  - name: covariate_analysis_name
    type: varchar
    description: A name for a covariate analysis, e.g. 'Pre-exposure'.
    is_primary_key: no
  - name: variable_of_interest
    type: int
    description: Is the variable of interest (1 = yes, 0 = no).
    is_primary_key: no
  - name: pre_exposure
    type: int
    description: Does the variable represent a pre-exposure period (1 = yes, 0 = no).
    is_primary_key: no
  - name: end_of_observation_period
    type: int
    description: Does the variable represent the end of the observation period (1
      = yes, 0 = no).
    is_primary_key: no
- name: sccs_covariate
  description: Results data table sccs_covariate.
  fields:
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: covariate_id
    type: int
    description: A unique identifier for a covariate.
    is_primary_key: yes
  - name: covariate_name
    type: varchar
    description: A description for the covariate.
    is_primary_key: no
  - name: era_id
    type: int
    description: A foreign key referencing the sccs_era table.
    is_primary_key: no
  - name: covariate_analysis_id
    type: int
    description: A foreign key referencing the sccs_covariate_analysis table.
    is_primary_key: no
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
- name: sccs_era
  description: Results data table sccs_era.
  fields:
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: analysis_id
    type: int
    description: A unique identifier for an analysis.
    is_primary_key: yes
  - name: era_type
    type: varchar
    description: The type of era (e.g. 'rx' for drugs).
    is_primary_key: yes
  - name: era_id
    type: int
    description: A unique identifier, corresponding to the ID in the source table
      (e.g. cohort_definition_id in a cohort table, or the drug_concept_id in the
      drug_era table).
    is_primary_key: yes
  - name: era_name
    type: varchar
    description: A name for the era. Is NULL for eras derived from cohorts.
    is_primary_key: no
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
- name: sccs_exposures_outcome_set
  description: Results data table sccs_exposures_outcome_set.
  fields:
  - name: exposures_outcome_set_id
    type: int
    description: A unique identifier for a set of exposures and an outcome.
    is_primary_key: yes
  - name: outcome_id
    type: int
    description: A cohort ID.
    is_primary_key: no
  - name: nesting_cohort_id
    type: int
    description: A cohort ID.
    is_primary_key: no
- name: sccs_exposure
  description: Results data table sccs_exposure.
  fields:
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: era_id
    type: int
    description: A foreign key referencing the sccs_era table.
    is_primary_key: yes
  - name: true_effect_size
    type: float
    description: If known, the true effect size. For negatitive controls this equals
      1.
    is_primary_key: no
- name: sccs_spline
  description: Results data table sccs_spline.
  fields:
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
  - name: spline_type
    type: varchar
    description: Either 'age', 'season', or 'calendar time'.
    is_primary_key: yes
  - name: knot_month
    type: float
    description: Location of the knot. For age, the month since birth. For season,
      the month of the year. For calendar time, the month since 1-1-1970.
    is_primary_key: yes
  - name: rr
    type: float
    description: The estimated relative risk (i.e. the incidence rate ratio).
    is_primary_key: no
- name: sccs_censor_model
  description: Results data table sccs_censor_model.
  fields:
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
  - name: parameter_id
    type: int
    description: The parameter number in the censor model (starting at 1).
    is_primary_key: yes
  - name: parameter_value
    type: float
    description: The fitted parameter value.
    is_primary_key: no
  - name: model_type
    type: varchar
    description: The type of censor model. Can be 'Weibull-Age'. 'Weibull-Interval',
      'Gamma-Age', or 'Gamma-Interval'.
    is_primary_key: no
- name: sccs_result
  description: Results data table sccs_result.
  fields:
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: covariate_id
    type: int
    description: A foreign key referencing the sccs_covariate table. The identifier
      for the covariate of interest.
    is_primary_key: yes
  - name: rr
    type: float
    description: The estimated relative risk (i.e. the incidence rate ratio).
    is_primary_key: no
  - name: ci_95_lb
    type: float
    description: The lower bound of the 95% confidence interval of the relative risk.
    is_primary_key: no
  - name: ci_95_ub
    type: float
    description: The upper bound of the 95% confidence interval of the relative risk.
    is_primary_key: no
  - name: p
    type: float
    description: The two-sided p-value considering the null hypothesis of no effect.
    is_primary_key: no
  - name: one_sided_p
    type: float
    description: The one-sided p-value considering the null hypothesis of IRR <= 1.
    is_primary_key: no
  - name: outcome_subjects
    type: int
    description: The number of subjects with at least one outcome.
    is_primary_key: no
  - name: outcome_events
    type: int
    description: The number of outcome events.
    is_primary_key: no
  - name: outcome_observation_periods
    type: int
    description: The number of observation periods containing at least one outcome.
    is_primary_key: no
  - name: covariate_subjects
    type: int
    description: The number of subjects having the covariate.
    is_primary_key: no
  - name: covariate_days
    type: int
    description: The total covariate time in days.
    is_primary_key: no
  - name: covariate_eras
    type: int
    description: The number of continuous eras of the covariate.
    is_primary_key: no
  - name: covariate_outcomes
    type: int
    description: The number of outcomes observed during the covariate time.
    is_primary_key: no
  - name: observed_days
    type: bigint
    description: The number of days subjects were observed.
    is_primary_key: no
  - name: log_rr
    type: float
    description: The log of the relative risk.
    is_primary_key: no
  - name: se_log_rr
    type: float
    description: The standard error of the log of the relative risk.
    is_primary_key: no
  - name: llr
    type: float
    description: The log of the likelihood ratio (of the MLE vs the null hypothesis
      of no effect).
    is_primary_key: no
  - name: calibrated_rr
    type: float
    description: The calibrated relative risk.
    is_primary_key: no
  - name: calibrated_ci_95_lb
    type: float
    description: The lower bound of the calibrated 95% confidence interval of the
      relative risk.
    is_primary_key: no
  - name: calibrated_ci_95_ub
    type: float
    description: The upper bound of the calibrated 95% confidence interval of the
      relative risk.
    is_primary_key: no
  - name: calibrated_p
    type: float
    description: The calibrated two-sided p-value.
    is_primary_key: no
  - name: calibrated_one_sided_p
    type: float
    description: The calibrated one-sided p-value considering the null hypothesis
      of IRR <= 1.
    is_primary_key: no
  - name: calibrated_log_rr
    type: float
    description: The log of the calibrated relative risk.
    is_primary_key: no
  - name: calibrated_se_log_rr
    type: float
    description: The standard error of the log of the calibrated relative risk.
    is_primary_key: no
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
- name: sccs_covariate_result
  description: Results data table sccs_covariate_result.
  fields:
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
  - name: covariate_id
    type: int
    description: The identifier for the covariate.
    is_primary_key: yes
  - name: rr
    type: float
    description: The estimated relative risk (i.e. the incidence rate ratio).
    is_primary_key: no
  - name: ci_95_lb
    type: float
    description: The lower bound of the 95% confidence interval of the relative risk.
    is_primary_key: no
  - name: ci_95_ub
    type: float
    description: The upper bound of the 95% confidence interval of the relative risk.
    is_primary_key: no
- name: sccs_attrition
  description: Results data table sccs_attrition.
  fields:
  - name: sequence_number
    type: int
    description: The place in the sequence of steps defining the final analysis cohort.
      1 indicates the original exposed population without any inclusion criteria.
    is_primary_key: yes
  - name: description
    type: varchar
    description: A description of the last restriction, e.g. 'Removing persons with
      the outcome prior'.
    is_primary_key: no
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: covariate_id
    type: int
    description: A foreign key referencing the sccs_covariate table. The identifier
      for the covariate of interest.
    is_primary_key: yes
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
  - name: outcome_subjects
    type: int
    description: The number of subjects with at least one outcome.
    is_primary_key: no
  - name: outcome_events
    type: int
    description: The number of outcome events.
    is_primary_key: no
  - name: outcome_observation_periods
    type: int
    description: The number of observation periods containing at least one outcome.
    is_primary_key: no
  - name: observed_days
    type: bigint
    description: The number of days subjects were observed.
    is_primary_key: no
- name: sccs_likelihood_profile
  description: Results data table sccs_likelihood_profile.
  fields:
  - name: log_rr
    type: float
    description: The log of the relative risk where the likelihood is sampled.
    is_primary_key: yes
  - name: log_likelihood
    type: float
    description: The normalized log likelihood.
    is_primary_key: no
  - name: gradient
    type: float
    description: The gradient of the log likelihood.
    is_primary_key: no
  - name: covariate_id
    type: int
    description: The identifier for the covariate of interest.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
- name: sccs_time_trend
  description: Results data table sccs_time_trend.
  fields:
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
  - name: calendar_year
    type: int
    description: The calendar year (e.g. 2022).
    is_primary_key: yes
  - name: calendar_month
    type: int
    description: The calendar month (e.g. 1 for January).
    is_primary_key: yes
  - name: observed_subjects
    type: int
    description: Number of people observed during the month.
    is_primary_key: no
  - name: ratio
    type: float
    description: Observed over expected ratio, where the expected count assumes a
      constant rate over time.
    is_primary_key: no
  - name: adjusted_ratio
    type: float
    description: Observed over expected ratio, where the expected count is adjusted
      for age, season, or calendar time, as specified in the analysis.
    is_primary_key: no
- name: sccs_time_to_event
  description: Results data table sccs_time_to_event.
  fields:
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
  - name: era_id
    type: int
    description: A foreign key referencing the sccs_era table. The identifier for
      the era of interest.
    is_primary_key: yes
  - name: week
    type: int
    description: The number of the week relative to exposure. Week 0 starts on the
      day of exposure initiation.
    is_primary_key: yes
  - name: observed_subjects
    type: int
    description: The numer of people observed during the week.
    is_primary_key: no
  - name: outcomes
    type: int
    description: The number of outcomes observed durig the week.
    is_primary_key: no
- name: sccs_age_spanning
  description: Results data table sccs_age_spanning.
  fields:
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
  - name: age_month
    type: int
    description: Age in months since birth.
    is_primary_key: yes
  - name: cover_before_after_subjects
    type: int
    description: Number of subjects whose observation period covers this month as
      well as the one before and after.
    is_primary_key: no
- name: sccs_calendar_time_spanning
  description: Results data table sccs_calendar_time_spanning.
  fields:
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
  - name: calendar_year
    type: int
    description: Calendar year (e.g. 2022)
    is_primary_key: yes
  - name: calendar_month
    type: int
    description: Calendar month (e.g. 1 is January).
    is_primary_key: yes
  - name: cover_before_after_subjects
    type: int
    description: Number of subjects whose observation period covers this month as
      well as the one before and after.
    is_primary_key: no
- name: sccs_diagnostics_summary
  description: Results data table sccs_diagnostics_summary.
  fields:
  - name: analysis_id
    type: int
    description: A foreign key referencing the sccs_analysis table.
    is_primary_key: yes
  - name: exposures_outcome_set_id
    type: int
    description: A foreign key referencing the sccs_exposures_outcome_set table.
    is_primary_key: yes
  - name: covariate_id
    type: int
    description: The identifier for the covariate of interest.
    is_primary_key: yes
  - name: database_id
    type: varchar
    description: Foreign key referencing the database.
    is_primary_key: yes
    references: database_meta_data.database_id
  - name: time_stability_p
    type: float
    description: The p for whether the mean monthly ratio between observed and expected
      exceeds the specified threshold.
    is_primary_key: no
  - name: time_stability_diagnostic
    type: varchar(20)
    description: Pass / fail / not evaluated classification of the time stability
      diagnostic.
    is_primary_key: no
  - name: event_exposure_lb
    type: float
    description: Lower bound of the 95% CI for the pre-expososure estimate
    is_primary_key: no
  - name: event_exposure_ub
    type: float
    description: Upper bound of the 95% CI for the pre-expososure estimate
    is_primary_key: no
  - name: event_exposure_diagnostic
    type: varchar(20)
    description: Pass / fail / not evaluated classification of the event-exposure
      independence diagnostic.
    is_primary_key: no
  - name: event_observation_lb
    type: float
    description: Lower bound of the 95% CI for the end of observation probe estimate
    is_primary_key: no
  - name: event_observation_ub
    type: float
    description: Upper bound of the 95% CI for the end of observation probe estimate
    is_primary_key: no
  - name: event_observation_diagnostic
    type: varchar(20)
    description: Pass / fail / not evaluated classification of the event-observation
      period dependence diagnostic.
    is_primary_key: no
  - name: rare_outcome_prevalence
    type: float
    description: The proportion of people in the underlying population who have the
      outcome at least once.
    is_primary_key: no
  - name: rare_outcome_diagnostic
    type: varchar(20)
    description: Pass / fail / not evaluated classification of the rare outcome diagnostic.
    is_primary_key: no
  - name: ease
    type: float
    description: The expected absolute systematic error.
    is_primary_key: no
  - name: ease_diagnostic
    type: varchar(20)
    description: Pass / warning / fail / not evaluated classification of the EASE
      diagnostic.
    is_primary_key: no
  - name: mdrr
    type: float
    description: The minimum detectable relative risk.
    is_primary_key: no
  - name: mdrr_diagnostic
    type: varchar(20)
    description: Pass / warning / fail / not evaluated classification of the MDRR
      diagnostic.
    is_primary_key: no
  - name: unblind
    type: int
    description: Is unblinding the result recommended? (1 = yes, 0 = no)
    is_primary_key: no
  - name: unblind_for_evidence_synthesis
    type: int
    description: Is unblinding the result for inclusion in evidence synthesis recommended?
      This ignores the MDRR diagnostic. (1 = yes, 0 = no)
    is_primary_key: no
