    type: varchar
    description: The abbreviated name of the database
    is_primary_key: no
  - name: cdm_holder
    type: varchar
    description: The owner of the CDM
    is_primary_key: no
  - name: source_description
    type: text
    description: The full description of the database
    is_primary_key: no
  - name: source_documentation_reference
    type: varchar
    description: The link to the documentation
    is_primary_key: no
  - name: cdm_etl_reference
    type: varchar
    description: The link to the ETL document
    is_primary_key: no
  - name: source_release_date
    type: varchar
    description: The release date for the data
    is_primary_key: no
  - name: cdm_release_date
    type: varchar
    description: The release date for the CDM data
    is_primary_key: no
  - name: cdm_version
    type: varchar
    description: The vocabulary version
    is_primary_key: no
  - name: vocabulary_version
    type: varchar
    description: The max date in the database
    is_primary_key: no
  - name: max_obs_period_end_date
    type: varchar
    description: Field max_obs_period_end_date in table plp_database_meta_data.
    is_primary_key: no
- name: plp_database_details
