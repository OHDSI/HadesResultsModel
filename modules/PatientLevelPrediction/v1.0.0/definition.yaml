  fields:
  - name: database_id
    type: int
    description: a unique identifier for the database
    is_primary_key: yes
  - name: database_meta_data_id
    type: varchar
    description: The shared databaseId
    is_primary_key: no
    references: database_meta_data.database_id
- name: plp_tars
