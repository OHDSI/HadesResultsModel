module: PatientLevelPrediction
prefix: plp_
tables:
- name: plp_cohorts
  description: Results data table plp_cohorts.
  fields:
  - name: cohort_id
    type: int
    description: a unique identifier for the cohort in the plp results database
    is_primary_key: yes
  - name: cohort_definition_id
    type: bigint
    description: the identifier in ATLAS for the cohort
    is_primary_key: no
    references: cg_cohort_definition.cohort_definition_id
  - name: cohort_name
    type: varchar
    description: the name of the cohort
    is_primary_key: no
- name: plp_cohort_definition
  description: Results data table plp_cohort_definition.
  fields:
  - name: cohort_definition_id
    type: bigint
    description: The ATLAS cohort definition id
    is_primary_key: no
    references: cg_cohort_definition.cohort_definition_id
  - name: cohort_name
    type: varchar
    description: The name of the cohort
    is_primary_key: no
  - name: description
    type: text
    description: A description of the cohort
    is_primary_key: no
  - name: json
    type: text
    description: The json spec for the cohort
    is_primary_key: no
  - name: sql_command
    type: text
    description: The SQL used to create the cohort
    is_primary_key: no
- name: plp_database_meta_data
  description: Results data table plp_database_meta_data.
  fields:
  - name: database_id
    type: varchar
    description: The shared databaseId
    is_primary_key: yes
    references: database_meta_data.database_id
  - name: cdm_source_name
    type: varchar
    description: The name of the database
    is_primary_key: no
