    type: bigint
    description: cohort subset parent id (some as if not a subset)
    is_primary_key: no
  - name: subset_definition_id
    type: bigint
    description: subset cohort definition id
    is_primary_key: no
  - name: is_subset
    type: int
    description: is the cohort a subset or not?
    is_primary_key: no
