  fields:
  - name: cohort_id
    type: bigint
    description: cohort id (documented from legacy CSV model).
    is_primary_key: yes
  - name: cohort_name
    type: varchar
    description: cohort name (documented from legacy CSV model).
    is_primary_key: no
  - name: metadata
    type: varchar
    description: meta data about the cohort
    is_primary_key: no
  - name: json
    type: varchar
    description: circe json description
    is_primary_key: no
