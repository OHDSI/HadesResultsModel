name: CI

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("testthat", "yaml", "jsonvalidate", "jsonlite", "DBI", "duckdb"), repos = "https://packagemanager.posit.co/cran/__linux__/jammy/latest")'

      - name: Run testthat suite
        run: |
          Rscript -e 'testthat::test_dir("tests/testthat", reporter = "summary")'